<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>P.M Food – รวมจำนวน OT</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap');
*{font-family:'Sarabun',sans-serif}
#sidebar{transition:transform .3s}
</style>
</head>
<body class="bg-gray-50">
<script src="/js/app.js"></script>
<script>
(async()=>{
  if(!await App.init('รวมจำนวน OT','สรุปรายแผนก — ข้อมูลอัปเดตอัตโนมัติเมื่อหัวหน้าแผนกกรอกข้อมูล')) return;
  if(App.user.role!=='hr'){ location.href='/pages/dashboard.html'; return; }
  load(App.getDate());
  window._onDateChange=d=>load(d);
})();

async function load(date){
  App.loading(true);
  try{
    const r=await fetch(`/api/ot/summary-ot?date=${date}`).then(r=>r.json());
    const depts=r.data||[], gOT=r.grand_ot||0, gNon=r.grand_non_ot||0, gTot=r.grand_total||0;

    document.getElementById('pageContent').innerHTML=`
      <div class="grid grid-cols-3 gap-4 mb-6">
        <div class="bg-gradient-to-br from-blue-700 to-blue-500 rounded-2xl p-5 text-white shadow-lg">
          <p class="text-blue-100 text-sm">ทำ OT รวม</p><p class="text-4xl font-bold mt-1">${gOT}</p><p class="text-blue-200 text-xs mt-1">คน</p>
        </div>
        <div class="bg-gradient-to-br from-slate-700 to-slate-500 rounded-2xl p-5 text-white shadow-lg">
          <p class="text-slate-200 text-sm">ไม่ทำ OT รวม</p><p class="text-4xl font-bold mt-1">${gNon}</p><p class="text-slate-300 text-xs mt-1">คน</p>
        </div>
        <div class="bg-gradient-to-br from-indigo-700 to-indigo-500 rounded-2xl p-5 text-white shadow-lg">
          <p class="text-indigo-200 text-sm">รวมทั้งหมด</p><p class="text-4xl font-bold mt-1">${gTot}</p><p class="text-indigo-200 text-xs mt-1">คน</p>
        </div>
      </div>

      <div class="flex gap-2 mb-5">
        <button onclick="App.exportExcel()" class="flex items-center gap-2 bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors shadow-sm">
          <i class="fas fa-file-excel"></i> Export Excel</button>
        <button onclick="App.exportPDF()" class="flex items-center gap-2 bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors shadow-sm">
          <i class="fas fa-file-pdf"></i> Export PDF</button>
      </div>

      <div class="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">
        <div class="bg-gradient-to-r from-slate-800 to-blue-900 px-6 py-4 flex items-center justify-between">
          <h3 class="text-white font-bold text-lg flex items-center gap-2">
            <i class="fas fa-table-list text-blue-300"></i> รวมจำนวน OT รายแผนก</h3>
          <span class="text-blue-200 text-sm">${App.dateThLong(date)}</span>
        </div>
        <div class="px-4 py-3 border-b border-gray-100 flex items-center gap-2">
          <i class="fas fa-search text-gray-400 text-sm"></i>
          <input type="text" placeholder="ค้นหาแผนก..." oninput="filterDept(this.value)"
            class="flex-1 text-sm border-0 outline-none text-slate-700 placeholder-slate-400">
        </div>
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead>
              <tr class="bg-gray-50 border-b border-gray-200">
                <th class="text-left px-5 py-3 text-slate-500 font-semibold w-10">#</th>
                <th class="text-left px-5 py-3 text-slate-500 font-semibold">หน่วยงาน (แผนก)</th>
                <th class="text-center px-5 py-3 text-blue-600 font-semibold w-28">ทำ OT</th>
                <th class="text-center px-5 py-3 text-slate-500 font-semibold w-28">ไม่ทำ OT</th>
                <th class="text-center px-5 py-3 text-slate-700 font-semibold w-28">รวม</th>
                <th class="text-center px-5 py-3 text-slate-400 font-semibold w-24">%OT</th>
              </tr>
            </thead>
            <tbody id="deptBody">
              ${depts.map((d,i)=>`
                <tr class="border-t border-gray-50 hover:bg-blue-50/30 transition-colors">
                  <td class="px-5 py-3 text-slate-400 text-xs">${i+1}</td>
                  <td class="px-5 py-3 text-slate-800 font-medium">${d.name_th}</td>
                  <td class="px-5 py-3 text-center">
                    <span class="inline-flex items-center gap-1 bg-blue-100 text-blue-700 px-3 py-1 rounded-full font-semibold text-sm">
                      <i class="fas fa-clock text-xs"></i> ${d.ot_total}</span>
                  </td>
                  <td class="px-5 py-3 text-center">
                    <span class="bg-gray-100 text-slate-600 px-3 py-1 rounded-full font-semibold text-sm">${d.non_ot_total}</span>
                  </td>
                  <td class="px-5 py-3 text-center font-bold text-slate-700">${d.ot_total+d.non_ot_total}</td>
                  <td class="px-5 py-3 text-center text-xs text-slate-400">
                    ${d.ot_total+d.non_ot_total>0 ? Math.round(d.ot_total/(d.ot_total+d.non_ot_total)*100)+'%' : '–'}
                  </td>
                </tr>`).join('')||'<tr><td colspan="6" class="text-center py-12 text-slate-400"><i class="fas fa-inbox text-3xl block mb-2"></i>ยังไม่มีข้อมูลสำหรับวันนี้</td></tr>'}
            </tbody>
            <tfoot>
              <tr class="bg-blue-50 border-t-2 border-blue-200">
                <td colspan="2" class="px-5 py-3 font-bold text-slate-800">รวม (ยอดรวม)</td>
                <td class="px-5 py-3 text-center"><span class="text-blue-700 font-bold text-lg">${gOT}</span></td>
                <td class="px-5 py-3 text-center"><span class="text-slate-600 font-bold text-lg">${gNon}</span></td>
                <td class="px-5 py-3 text-center"><span class="text-slate-800 font-bold text-lg">${gTot}</span></td>
                <td class="px-5 py-3 text-center text-slate-400 text-sm">${gTot>0?Math.round(gOT/gTot*100)+'%':'–'}</td>
              </tr>
            </tfoot>
          </table>
        </div>
      </div>
    `;
  }catch(e){ App.toast('โหลดข้อมูลไม่ได้','error'); }
  finally{ App.loading(false); }
}

function filterDept(q){
  document.querySelectorAll('#deptBody tr').forEach(tr=>{
    tr.style.display=tr.textContent.toLowerCase().includes(q.toLowerCase())?'':'none';
  });
}
</script>
</body></html>
