<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>P.M Food – ลงข้อมูล OT</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap');
*{font-family:'Sarabun',sans-serif}
#sidebar{transition:transform .3s}
.n{width:68px;text-align:center;border:1.5px solid #e2e8f0;border-radius:8px;padding:4px 4px;font-size:.875rem;background:#f8fafc;transition:all .2s}
.n:focus{border-color:#3b82f6;background:#fff;outline:none;box-shadow:0 0 0 3px rgba(59,130,246,.1)}
thead th{position:sticky;top:0;z-index:5;background:inherit}
</style>
</head>
<body class="bg-gray-50">
<script src="/js/app.js"></script>
<script>
let allRoutes=[], depts=[], curDeptId=null;

(async()=>{
  if(!await App.init('ลงข้อมูล OT','บันทึกจำนวนพนักงานต่อสายรถ')) return;
  const u=App.user;
  const [rr,dr]=await Promise.all([
    fetch('/api/bus/routes').then(r=>r.json()),
    u.role==='hr' ? fetch('/api/departments').then(r=>r.json()) : Promise.resolve({data:[]})
  ]);
  allRoutes=rr.data||[]; depts=dr.data||[];
  curDeptId = u.role==='department' ? u.dept_id : (depts[0]?._id||null);
  renderPage();
  loadData(App.getDate());
  window._onDateChange=d=>loadData(d);
})();

function renderPage(){
  const isHR=App.user.role==='hr';
  document.getElementById('pageContent').innerHTML=`
    <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-4 mb-4">
      <div class="flex flex-wrap items-center gap-3">
        ${isHR?`<div class="flex items-center gap-2">
          <label class="text-sm font-semibold text-slate-700 shrink-0">แผนก:</label>
          <select id="deptSel" onchange="onDeptChange(this.value)"
            class="border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-500 bg-gray-50">
            ${depts.map(d=>`<option value="${d._id}">${d.name_th}</option>`).join('')}
          </select></div>`:`
          <div class="flex items-center gap-2"><i class="fas fa-building text-blue-500"></i>
          <span class="font-semibold text-slate-800">${App.user.dept_name||App.user.display_name}</span></div>`}
        <div class="flex items-center gap-2 ml-auto flex-wrap">
          <button onclick="resetAll()" class="flex items-center gap-1.5 px-3 py-2 rounded-lg text-sm bg-gray-100 hover:bg-gray-200 text-slate-700 transition-colors">
            <i class="fas fa-rotate-left"></i> ล้างตาราง</button>
          <button onclick="saveAll()" class="flex items-center gap-1.5 px-4 py-2 rounded-lg text-sm bg-green-600 hover:bg-green-700 text-white font-semibold transition-colors shadow-sm">
            <i class="fas fa-floppy-disk"></i> บันทึก</button>
        </div>
      </div>
      <div class="mt-3 pt-3 border-t border-gray-100 flex flex-wrap items-center gap-3 text-sm">
        <label class="text-slate-600 font-medium shrink-0">ลงชื่อผู้บันทึก:</label>
        <input id="recorder" type="text" placeholder="ชื่อผู้บันทึกข้อมูล"
          class="border border-gray-200 rounded-lg px-3 py-1.5 text-sm focus:outline-none focus:border-blue-500 w-44 bg-gray-50">
        <span class="text-slate-400 text-xs ml-auto">ประจำวันที่ <span id="dtDisp" class="font-semibold text-slate-600"></span></span>
      </div>
    </div>

    <div class="flex flex-wrap gap-3 mb-4">
      <div class="bg-blue-50 border border-blue-100 rounded-xl px-4 py-2 flex items-center gap-2">
        <i class="fas fa-clock text-blue-500 text-sm"></i>
        <span class="text-sm text-slate-600">ทำ OT (19:00): <strong id="sOT" class="text-blue-700 text-base">0</strong> คน</span>
      </div>
      <div class="bg-slate-50 border border-slate-100 rounded-xl px-4 py-2 flex items-center gap-2">
        <i class="fas fa-house text-slate-400 text-sm"></i>
        <span class="text-sm text-slate-600">ไม่ทำ OT (16:00): <strong id="sNon" class="text-slate-600 text-base">0</strong> คน</span>
      </div>
      <div class="bg-indigo-50 border border-indigo-100 rounded-xl px-4 py-2 flex items-center gap-2">
        <i class="fas fa-users text-indigo-500 text-sm"></i>
        <span class="text-sm text-slate-600">รวมมาทั้งหมด: <strong id="sTot" class="text-indigo-700 text-base">0</strong> คน</span>
      </div>
    </div>

    <div class="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">
      <div class="overflow-x-auto" style="max-height:calc(100vh - 340px);overflow-y:auto">
        <table class="w-full text-sm min-w-[560px]">
          <thead>
            <tr class="bg-gradient-to-r from-slate-800 to-blue-900 text-white">
              <th class="text-left px-4 py-3 font-semibold min-w-[170px]">สายรถ</th>
              <th class="text-center px-3 py-3 font-medium w-28 text-blue-200">จุดงาน</th>
              <th class="text-center px-3 py-3 font-semibold w-28">
                <span class="bg-blue-500/40 px-2 py-0.5 rounded text-xs block">เลิก 19:00</span>
                <span class="text-[10px] text-blue-200 font-normal">ทำ OT</span>
              </th>
              <th class="text-center px-3 py-3 font-semibold w-28">
                <span class="bg-slate-500/40 px-2 py-0.5 rounded text-xs block">เลิก 16:00</span>
                <span class="text-[10px] text-blue-200 font-normal">ไม่ทำ OT</span>
              </th>
              <th class="text-center px-3 py-3 font-normal w-16 text-slate-400 text-xs">รวม</th>
            </tr>
          </thead>
          <tbody id="otBody"></tbody>
          <tfoot>
            <tr class="bg-blue-50 border-t-2 border-blue-200 font-bold">
              <td class="px-4 py-3 text-slate-700" colspan="2">รวมทั้งหมด</td>
              <td class="px-3 py-3 text-center text-blue-700 text-base" id="fOT">0</td>
              <td class="px-3 py-3 text-center text-slate-600 text-base" id="fNon">0</td>
              <td class="px-3 py-3 text-center text-slate-800 text-base" id="fTot">0</td>
            </tr>
          </tfoot>
        </table>
      </div>
    </div>
  `;
}

function onDeptChange(id){ curDeptId=id; loadData(App.getDate()); }

async function loadData(date){
  const dd=document.getElementById('dtDisp');
  if(dd) dd.textContent=App.dateThLong(date);
  if(!curDeptId) return;
  App.loading(true);
  try{
    const r=await fetch(`/api/ot/dept-data?date=${date}&dept_id=${curDeptId}`).then(r=>r.json());
    document.getElementById('recorder').value=r.recorder_name||'';
    buildTable(r.data||[]);
  }catch(e){ App.toast('โหลดข้อมูลไม่ได้','error'); }
  finally{ App.loading(false); }
}

function buildTable(rows){
  const b=document.getElementById('otBody'); if(!b) return;
  b.innerHTML=rows.map(r=>`
    <tr data-id="${r.bus_route_id}" class="border-t border-gray-100 hover:bg-gray-50 transition-colors">
      <td class="px-4 py-2 font-medium text-slate-700">${r.route_number==='0'?'มาเอง':`สาย ${r.route_number} ${r.route_name}`}</td>
      <td class="px-3 py-2 text-center text-xs text-slate-400">${r.job_zone||''}</td>
      <td class="px-3 py-2 text-center"><input type="number" min="0" max="999" value="${r.ot_count}" class="n oi" oninput="calcRow(this)"></td>
      <td class="px-3 py-2 text-center"><input type="number" min="0" max="999" value="${r.non_ot_count}" class="n ni" oninput="calcRow(this)"></td>
      <td class="px-3 py-2 text-center text-xs text-slate-500 rt font-semibold">${r.ot_count+r.non_ot_count}</td>
    </tr>`).join('');
  calcAll();
}

function calcRow(el){
  const tr=el.closest('tr');
  const ot=parseInt(tr.querySelector('.oi').value)||0;
  const non=parseInt(tr.querySelector('.ni').value)||0;
  tr.querySelector('.rt').textContent=ot+non;
  calcAll();
}

function calcAll(){
  let ot=0,non=0;
  document.querySelectorAll('#otBody .oi').forEach(e=>ot+=parseInt(e.value)||0);
  document.querySelectorAll('#otBody .ni').forEach(e=>non+=parseInt(e.value)||0);
  ['sOT','fOT'].forEach(id=>{const e=document.getElementById(id);if(e)e.textContent=ot;});
  ['sNon','fNon'].forEach(id=>{const e=document.getElementById(id);if(e)e.textContent=non;});
  ['sTot','fTot'].forEach(id=>{const e=document.getElementById(id);if(e)e.textContent=ot+non;});
}

function resetAll(){
  if(!confirm('ล้างข้อมูลทั้งหมดในตาราง?')) return;
  document.querySelectorAll('#otBody .oi,.oi.ni,.ni').forEach(e=>e.value=0);
  document.querySelectorAll('#otBody .oi,.ni').forEach(e=>e.value=0);
  document.querySelectorAll('#otBody .rt').forEach(e=>e.textContent=0);
  calcAll();
}

async function saveAll(){
  const date=App.getDate(), recorder=document.getElementById('recorder').value||'';
  const rows=[];
  document.querySelectorAll('#otBody tr[data-id]').forEach(tr=>{
    rows.push({ bus_route_id:tr.dataset.id,
      ot_count:    parseInt(tr.querySelector('.oi').value)||0,
      non_ot_count:parseInt(tr.querySelector('.ni').value)||0 });
  });
  if(!rows.length){ App.toast('ไม่มีข้อมูล','warning'); return; }
  App.loading(true);
  try{
    const r=await fetch('/api/ot/save-dept',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({date,department_id:curDeptId,rows,recorder_name:recorder})}).then(r=>r.json());
    if(r.success) App.toast('บันทึกสำเร็จ ✓','success');
    else App.toast('บันทึกไม่สำเร็จ: '+r.message,'error');
  }catch(e){ App.toast('เกิดข้อผิดพลาด','error'); }
  finally{ App.loading(false); }
}
</script>
</body></html>
