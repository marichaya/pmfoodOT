<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>P.M Food – Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap');
*{font-family:'Sarabun',sans-serif}
#sidebar{transition:transform .3s}
.card{transition:all .25s}.card:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(0,0,0,.08)}
</style>
</head>
<body class="bg-gray-50">
<script src="/js/app.js"></script>
<script>
let _chart=null;
(async()=>{
  if(!await App.init('Dashboard','ภาพรวมระบบ OT ประจำวัน')) return;
  load(App.getDate());
  window._onDateChange=d=>load(d);
})();

async function load(date){
  App.loading(true);
  try{
    const [s1,s2]=await Promise.all([
      fetch(`/api/ot/summary-ot?date=${date}`).then(r=>r.json()),
      fetch(`/api/ot/summary-bus?date=${date}`).then(r=>r.json())
    ]);
    const depts=s1.data||[], buses=s2.data||[];
    const gOT=s1.grand_ot||0, gNon=s1.grand_non_ot||0, gTot=s1.grand_total||0;
    const busActive=buses.filter(b=>b.total_count>0).length;

    document.getElementById('pageContent').innerHTML=`
      <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
        ${card('ทำ OT รวม',gOT,'fa-clock','from-blue-600 to-blue-500')}
        ${card('ไม่ทำ OT',gNon,'fa-house','from-slate-600 to-slate-500')}
        ${card('รวมทั้งหมด',gTot,'fa-users','from-indigo-600 to-indigo-500')}
        ${card('สายรถมีพนักงาน',busActive,'fa-bus','from-cyan-600 to-cyan-500')}
      </div>
      <div class="grid lg:grid-cols-5 gap-6 mb-6">
        <div class="lg:col-span-3 bg-white rounded-2xl border border-gray-100 shadow-sm p-5 card">
          <h3 class="font-bold text-slate-800 mb-4 flex items-center gap-2">
            <i class="fas fa-chart-bar text-blue-500"></i> OT รายแผนก
            <span class="text-xs text-slate-400 font-normal ml-auto">${App.dateThLong(date)}</span>
          </h3>
          <div class="relative h-52"><canvas id="dChart"></canvas></div>
        </div>
        <div class="lg:col-span-2 bg-white rounded-2xl border border-gray-100 shadow-sm p-5 card overflow-hidden">
          <h3 class="font-bold text-slate-800 mb-3 flex items-center gap-2"><i class="fas fa-table text-blue-500"></i> สรุปรายแผนก</h3>
          <div class="overflow-auto max-h-52">
            <table class="w-full text-xs">
              <thead><tr class="bg-gray-50 sticky top-0">
                <th class="text-left px-2 py-2 text-slate-500 font-semibold">แผนก</th>
                <th class="text-center px-2 py-2 text-blue-600 font-semibold">OT</th>
                <th class="text-center px-2 py-2 text-slate-500 font-semibold">ไม่OT</th>
                <th class="text-center px-2 py-2 text-slate-700 font-semibold">รวม</th>
              </tr></thead>
              <tbody>
                ${depts.filter(d=>d.ot_total+d.non_ot_total>0).map(d=>`
                  <tr class="border-t border-gray-50 hover:bg-gray-50">
                    <td class="px-2 py-1.5 text-slate-700 max-w-[90px] truncate" title="${d.name_th}">${d.name_th}</td>
                    <td class="px-2 py-1.5 text-center"><span class="bg-blue-100 text-blue-700 px-1.5 py-0.5 rounded-full font-semibold">${d.ot_total}</span></td>
                    <td class="px-2 py-1.5 text-center text-slate-400">${d.non_ot_total}</td>
                    <td class="px-2 py-1.5 text-center font-bold text-slate-700">${d.ot_total+d.non_ot_total}</td>
                  </tr>`).join('')||'<tr><td colspan="4" class="text-center py-6 text-slate-400 text-sm">ยังไม่มีข้อมูล</td></tr>'}
              </tbody>
            </table>
          </div>
        </div>
      </div>
      <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-5 card">
        <div class="flex items-center justify-between mb-3">
          <h3 class="font-bold text-slate-800 flex items-center gap-2"><i class="fas fa-bus text-blue-500"></i> สรุปสายรถ</h3>
          <a href="/pages/bus-schedule.html" class="text-xs text-blue-600 hover:underline flex items-center gap-1"><i class="fas fa-arrow-right text-xs"></i> จัดการสายรถ</a>
        </div>
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead><tr class="bg-gray-50">
              <th class="text-left px-3 py-2 text-slate-500 font-semibold">สายรถ</th>
              <th class="text-center px-3 py-2 text-slate-500 font-semibold w-24">จุดงาน</th>
              <th class="text-center px-3 py-2 text-slate-600 font-semibold w-24">มาทั้งหมด</th>
              <th class="text-center px-3 py-2 text-blue-600 font-semibold w-24">OT 19:00</th>
              <th class="text-center px-3 py-2 text-slate-500 font-semibold w-24">เลิก 16:00</th>
            </tr></thead>
            <tbody>
              ${buses.filter(b=>b.total_count>0).slice(0,12).map(b=>`
                <tr class="border-t border-gray-50 hover:bg-gray-50">
                  <td class="px-3 py-2 font-medium text-slate-700">${b.route_number==='0'?'มาเอง':`สาย ${b.route_number} <span class="text-slate-400 font-normal">${b.route_name}</span>`}</td>
                  <td class="px-3 py-2 text-center text-xs text-slate-400">${b.job_zone||''}</td>
                  <td class="px-3 py-2 text-center font-semibold text-slate-700">${b.total_count}</td>
                  <td class="px-3 py-2 text-center"><span class="bg-blue-100 text-blue-700 px-2 py-0.5 rounded-full text-xs font-semibold">${b.ot_total}</span></td>
                  <td class="px-3 py-2 text-center text-slate-400">${b.non_ot_total}</td>
                </tr>`).join('')||'<tr><td colspan="5" class="text-center py-8 text-slate-400">ยังไม่มีข้อมูล</td></tr>'}
            </tbody>
          </table>
        </div>
      </div>
    `;

    if(_chart){ _chart.destroy(); _chart=null; }
    const active=depts.filter(d=>d.ot_total+d.non_ot_total>0);
    const ctx=document.getElementById('dChart');
    if(ctx&&active.length){
      _chart=new Chart(ctx,{
        type:'bar',
        data:{
          labels:active.map(d=>d.name_th.length>8?d.name_th.slice(0,8)+'…':d.name_th),
          datasets:[
            {label:'ทำ OT',data:active.map(d=>d.ot_total),backgroundColor:'rgba(37,99,235,.8)',borderRadius:5},
            {label:'ไม่ทำ OT',data:active.map(d=>d.non_ot_total),backgroundColor:'rgba(148,163,184,.7)',borderRadius:5}
          ]
        },
        options:{responsive:true,maintainAspectRatio:false,
          plugins:{legend:{labels:{font:{family:'Sarabun',size:11}}}},
          scales:{y:{beginAtZero:true,ticks:{stepSize:1,font:{family:'Sarabun'}}},
                  x:{ticks:{font:{family:'Sarabun',size:10}}}}}
      });
    }
  }catch(e){ App.toast('โหลดข้อมูลไม่ได้: '+e.message,'error'); }
  finally{ App.loading(false); }
}

function card(label,val,icon,grad){
  return `<div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-5 card">
    <div class="flex items-start justify-between">
      <div><p class="text-slate-500 text-sm">${label}</p><p class="text-3xl font-bold text-slate-800 mt-1">${val}</p></div>
      <div class="w-12 h-12 bg-gradient-to-br ${grad} rounded-xl flex items-center justify-center shadow-md shrink-0">
        <i class="fas ${icon} text-white text-lg"></i></div>
    </div></div>`;
}
</script>
</body></html>
